# ── clinical_reasoning_agent 项目配置 (v0.3 MVP) ──

llm:
  provider: deepseek           # deepseek | gptsapi | ollama
  model: deepseek-v4-flash     # 或 deepseek-reasoner, llama3, qwen2.5 等
  api_key_env: DEEPSEEK_API_KEY
  base_url: https://api.deepseek.com
  temperature: 0.1
  max_tokens: 4096
  reasoning_effort: medium     # low | medium | high

# ── 多模型交叉验证配置（Tier 2 架构/核心代码时启用）─
multi_model:
  enabled: false               # 默认关闭，Tier 2 任务时手动启用

  models:
    primary:                   # 架构设计 + 主方案提出者
      provider: gptsapi
      model: claude-sonnet-4-6
      api_key_env: GPTS_API_KEY
      base_url: https://api.gptsapi.net/v1
      temperature: 0.3
      max_tokens: 8192
      reasoning_effort: high

    critic:                    # 代码审查 / 替代方案
      provider: gptsapi
      model: gpt-4.1-mini
      api_key_env: GPTS_API_KEY
      base_url: https://api.gptsapi.net/v1
      temperature: 0.5
      max_tokens: 4096

  convergence:                 # 收敛仲裁者
    provider: deepseek
    model: deepseek-v4-flash
    api_key_env: DEEPSEEK_API_KEY
    base_url: https://api.deepseek.com/v1
    temperature: 0.1
    max_tokens: 4096
    reasoning_effort: medium

  max_parallel: 2
  timeout: 60

database:
  path: data/knowledge_base.db

vector_store:
  path: data/faiss_index
  embedding_model: all-MiniLM-L6-v2

reasoning:
  engine: rule_based            # rule_based | hybrid (future)
  confidence_strategy: weighted_sum  # max | weighted_sum | product
  rules_path: data/ontology/diagnostic_rules.json  # M-rule 规则文件路径

soap:
  include_graph_context: true   # SOAP 中是否包含图谱检索上下文
  include_vector_context: true  # SOAP 中是否包含向量检索上下文
  max_chunks: 5                 # 最多引用多少个检索片段

logging:
  level: INFO                   # DEBUG | INFO | WARNING | ERROR